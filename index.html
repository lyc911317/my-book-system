<!DOCTYPE html>
<html lang="zh-Hant"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>BiblioKeep 書籍管理與掃描系統</title> <!-- Tailwind CSS CDN --> <script src="https://www.google.com/search?q=https://cdn.tailwindcss.com"></script> <!-- Font Awesome 圖示 --> <link rel="stylesheet" href="https://www.google.com/search?q=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <!-- Html5-Qrcode 條碼掃描庫 --> <script src="https://www.google.com/search?q=https://unpkg.com/html5-qrcode"></script> <style> /* 隱藏預設滾動條但保持功能 */ .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } </style> </head> <body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">
<!-- 頂部導航欄 -->
<header class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fa-solid fa-book-bookmark"></i>
            BiblioKeep
        </h1>
        <span class="text-xs bg-indigo-500 px-2 py-1 rounded-full border border-indigo-400">雲端同步中</span>
    </div>
</header>

<!-- 主要內容區 (適配手機端高度) -->
<main class="flex-1 max-w-md w-full mx-auto p-4 flex flex-col gap-6 pb-24">
    
    <!-- 核心設定提示 (如果未填寫 URL 則顯示) -->
    <div id="setup-warning" class="bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-lg shadow-sm">
        <div class="flex items-start gap-3">
            <i class="fa-solid fa-circle-exclamation text-amber-500 mt-1 text-lg"></i>
            <div>
                <h3 class="font-bold text-amber-800 text-sm">尚未設定 Google 試算表 URL</h3>
                <p class="text-xs text-amber-700 mt-1">請在程式碼第 42 行填入您的 Google Apps Script 網頁應用程式網址，才能啟用雲端儲存功能喔！</p>
            </div>
        </div>
    </div>

    <!-- 條碼掃描區域 -->
    <section class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-slate-700">
            <i class="fa-solid fa-barcode text-indigo-500"></i>
            條碼掃描器
        </h2>
        
        <!-- 掃描視窗容器 -->
        <div class="relative rounded-xl overflow-hidden bg-slate-900 border border-slate-200 aspect-[4/3] flex items-center justify-center">
            <div id="interactive" class="w-full h-full"></div>
            <!-- 掃描輔助紅線框 -->
            <div id="scanner-laser" class="absolute inset-0 pointer-events-none flex flex-col justify-center items-center hidden">
                <div class="w-4/5 h-1/3 border-2 border-dashed border-red-500 rounded-lg relative flex items-center justify-center">
                    <div class="w-full h-[2px] bg-red-500 animate-pulse"></div>
                </div>
                <span class="text-white text-xs bg-slate-900/80 px-3 py-1 rounded-full mt-3">請將條碼置於框線內</span>
            </div>
            <!-- 未開啟鏡頭時的提示 -->
            <div id="scanner-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-6 text-center">
                <i class="fa-solid fa-camera text-4xl mb-3 text-slate-600"></i>
                <p class="text-sm">點擊下方按鈕開啟相機掃描 ISBN</p>
            </div>
        </div>

        <!-- 控制按鈕 -->
        <div class="flex gap-2 mt-4">
            <button id="btn-toggle-scan" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 flex items-center justify-center gap-2 shadow-md shadow-indigo-100">
                <i id="scan-btn-icon" class="fa-solid fa-play"></i>
                <span id="scan-btn-text">啟動相機掃描</span>
            </button>
            <button id="btn-manual-input" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold p-3 rounded-xl transition duration-200 flex items-center justify-center" title="手動輸入 ISBN">
                <i class="fa-solid fa-keyboard text-lg"></i>
            </button>
        </div>
    </section>

    <!-- 書籍確認/編輯表單 -->
    <section id="book-form-section" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 hidden">
        <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
            <h2 class="text-lg font-bold flex items-center gap-2 text-slate-700">
                <i class="fa-solid fa-book text-indigo-500"></i>
                書籍資訊確認
            </h2>
            <button id="btn-clear-form" class="text-slate-400 hover:text-red-500 text-sm">
                <i class="fa-solid fa-trash-can"></i> 清除
            </button>
        </div>

        <form id="book-form" class="flex flex-col gap-4">
            <!-- 封面與基本資料 -->
            <div class="flex gap-4">
                <div class="w-24 h-32 bg-slate-100 rounded-lg border border-slate-200 flex flex-col items-center justify-center overflow-hidden flex-shrink-0 relative">
                    <img id="form-cover" src="" alt="書籍封面" class="w-full h-full object-cover hidden">
                    <div id="form-cover-placeholder" class="text-slate-400 flex flex-col items-center">
                        <i class="fa-regular fa-image text-2xl mb-1"></i>
                        <span class="text-[10px]">無封面</span>
                    </div>
                </div>
                
                <div class="flex-1 flex flex-col gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">書名 *</label>
                        <input type="text" id="input-title" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">作者</label>
                        <input type="text" id="input-author" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500">
                    </div>
                </div>
            </div>

            <!-- 其他欄位 -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">ISBN 碼</label>
                    <input type="text" id="input-isbn" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">出版社</label>
                    <input type="text" id="input-publisher" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">出版日期</label>
                    <input type="text" id="input-publish-date" placeholder="YYYY-MM" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">封面網址</label>
                    <input type="url" id="input-cover-url" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">個人備註 / 放置位置</label>
                <textarea id="input-notes" rows="2" placeholder="例如：客房書櫃、已讀、極力推薦..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500"></textarea>
            </div>

            <!-- 儲存按鈕 -->
            <button type="submit" id="btn-save-book" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition duration-200 flex items-center justify-center gap-2 shadow-lg shadow-emerald-100">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                儲存書籍到 Google 試算表
            </button>
        </form>
    </section>

</main>

<!-- 手動輸入 ISBN 燈箱 (Modal) -->
<div id="modal-manual" class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-xl border border-slate-100 animate-in fade-in zoom-in-95 duration-150">
        <h3 class="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">
            <i class="fa-solid fa-magnifying-glass text-indigo-500"></i>
            手動輸入 ISBN 查詢
        </h3>
        <p class="text-xs text-slate-500 mb-4">請輸入書籍背面的 13 位或 10 位 ISBN 號碼。</p>
        
        <input type="text" id="modal-isbn-input" placeholder="例如: 9789863127390" class="w-full border border-slate-200 bg-slate-50 rounded-xl px-4 py-3 text-base text-center font-mono tracking-widest focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 mb-4">
        
        <div class="flex gap-2">
            <button id="btn-modal-cancel" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold py-3 rounded-xl transition">取消</button>
            <button id="btn-modal-submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-1">
                <i class="fa-solid fa-search"></i> 查詢
            </button>
        </div>
    </div>
</div>

<!-- 自訂通知訊息 UI (替代不美觀的 Alert) -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-xl shadow-lg flex items-center gap-2 text-sm font-semibold transition-all duration-300 transform translate-y-12 opacity-0 pointer-events-none">
    <i id="toast-icon" class="fa-solid"></i>
    <span id="toast-message"></span>
</div>

<script>
    // ==========================================
    // 【重要核心設定】：請在此處填入您的 Google Apps Script URL
    // ==========================================
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxIGRl4GqQO4N1um4C72JsAwh0haEBsQqKusQkSlnSx7zEzLkyRraTQeg0RWB6w6TU/exec';

    // 檢查是否填寫了 URL，並調整提示畫面
    const setupWarning = document.getElementById('setup-warning');
    if (GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL !== '請將您的網頁應用程式URL貼在這邊') {
        setupWarning.classList.add('hidden');
    }

    // DOM 元素選取
    const btnToggleScan = document.getElementById('btn-toggle-scan');
    const scanBtnIcon = document.getElementById('scan-btn-icon');
    const scanBtnText = document.getElementById('scan-btn-text');
    const scannerPlaceholder = document.getElementById('scanner-placeholder');
    const scannerLaser = document.getElementById('scanner-laser');
    
    const bookFormSection = document.getElementById('book-form-section');
    const bookForm = document.getElementById('book-form');
    const formCover = document.getElementById('form-cover');
    const formCoverPlaceholder = document.getElementById('form-cover-placeholder');
    
    const inputTitle = document.getElementById('input-title');
    const inputAuthor = document.getElementById('input-author');
    const inputIsbn = document.getElementById('input-isbn');
    const inputPublisher = document.getElementById('input-publisher');
    const inputPublishDate = document.getElementById('input-publish-date');
    const inputCoverUrl = document.getElementById('input-cover-url');
    const inputNotes = document.getElementById('input-notes');
    const btnClearForm = document.getElementById('btn-clear-form');

    const btnManualInput = document.getElementById('btn-manual-input');
    const modalManual = document.getElementById('modal-manual');
    const modalIsbnInput = document.getElementById('modal-isbn-input');
    const btnModalCancel = document.getElementById('btn-modal-cancel');
    const btnModalSubmit = document.getElementById('btn-modal-submit');

    const toast = document.getElementById('toast');
    const toastIcon = document.getElementById('toast-icon');
    const toastMessage = document.getElementById('toast-message');

    // 掃描器狀態控制
    let html5QrCode = null;
    let isScanning = false;

    // 顯示通知訊息 (Toast UI)
    function showToast(message, type = 'success') {
        toastMessage.textContent = message;
        toast.className = "fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-xl shadow-lg flex items-center gap-2 text-sm font-semibold transition-all duration-300 transform";
        
        if (type === 'success') {
            toast.classList.add('bg-emerald-600', 'text-white');
            toastIcon.className = "fa-solid fa-circle-check text-lg";
        } else if (type === 'error') {
            toast.classList.add('bg-red-600', 'text-white');
            toastIcon.className = "fa-solid fa-circle-xmark text-lg";
        } else {
            toast.classList.add('bg-slate-800', 'text-white');
            toastIcon.className = "fa-solid fa-circle-info text-lg";
        }

        // 浮現效果
        toast.classList.remove('translate-y-12', 'opacity-0');
        toast.classList.add('translate-y-0', 'opacity-100');

        setTimeout(() => {
            toast.classList.remove('translate-y-0', 'opacity-100');
            toast.classList.add('translate-y-12', 'opacity-0');
        }, 3000);
    }

    // 開啟/關閉鏡頭掃描
    async function toggleScanner() {
        if (isScanning) {
            stopScanner();
        } else {
            startScanner();
        }
    }

    async function startScanner() {
        try {
            // 初始化掃描對象
            html5QrCode = new Html5Qrcode("interactive");
            
            scannerPlaceholder.classList.add('hidden');
            scannerLaser.classList.remove('hidden');

            const config = {
                fps: 10,
                qrbox: function(width, height) {
                    // 條碼通常是扁的，設定適合一維條碼的掃描視窗
                    return { width: Math.floor(width * 0.8), height: Math.floor(height * 0.3) };
                },
                aspectRatio: 1.333333
            };

            await html5QrCode.start(
                { facingMode: "environment" }, // 使用後鏡頭
                config,
                onScanSuccess
            );

            isScanning = true;
            scanBtnIcon.className = "fa-solid fa-stop";
            scanBtnText.textContent = "停止相機";
            btnToggleScan.classList.replace('bg-indigo-600', 'bg-red-500');
        } catch (err) {
            console.error("無法開啟相機:", err);
            showToast("相機啟動失敗，請確認已授予鏡頭權限", "error");
            stopScanner();
        }
    }

    async function stopScanner() {
        if (html5QrCode && isScanning) {
            try {
                await html5QrCode.stop();
            } catch (err) {
                console.error("停止相機失敗:", err);
            }
        }
        isScanning = false;
        scannerPlaceholder.classList.remove('hidden');
        scannerLaser.classList.add('hidden');
        scanBtnIcon.className = "fa-solid fa-play";
        scanBtnText.textContent = "啟動相機掃描";
        btnToggleScan.classList.replace('bg-red-500', 'bg-indigo-600');
    }

    // 掃描成功回呼
    function onScanSuccess(decodedText, decodedResult) {
        // ISBN 通常為 EAN-13 (978或979開頭) 或 EAN-10
        const cleanCode = decodedText.trim().replace(/[-\s]/g, '');
        if (cleanCode.length === 10 || cleanCode.length === 13) {
            stopScanner();
            showToast("成功讀取條碼：" + cleanCode);
            fetchBookInfo(cleanCode);
        }
    }

    // 查詢書籍 API (串接台灣/國際常見圖書資料庫)
    async function fetchBookInfo(isbn) {
        showToast("正在搜尋書籍資料...", "info");
        
        try {
            // 優先使用 Google Books API 查詢
            const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
            const data = await response.json();
            
            if (data.totalItems > 0) {
                const volumeInfo = data.items[0].volumeInfo;
                populateForm({
                    title: volumeInfo.title || "",
                    author: volumeInfo.authors ? volumeInfo.authors.join(", ") : "",
                    isbn: isbn,
                    publisher: volumeInfo.publisher || "",
                    publishDate: volumeInfo.publishedDate || "",
                    coverUrl: volumeInfo.imageLinks ? volumeInfo.imageLinks.thumbnail.replace('http://', 'https://') : ""
                });
                showToast("已成功載入書籍資料！");
            } else {
                // 若 Google Books 找不到，改嘗試 Open Library
                const olResponse = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
                const olData = await olResponse.json();
                const bookKey = `ISBN:${isbn}`;
                
                if (olData[bookKey]) {
                    const book = olData[bookKey];
                    populateForm({
                        title: book.title || "",
                        author: book.authors ? book.authors.map(a => a.name).join(", ") : "",
                        isbn: isbn,
                        publisher: book.publishers ? book.publishers.map(p => p.name).join(", ") : "",
                        publishDate: book.publish_date || "",
                        coverUrl: book.cover ? book.cover.medium : ""
                    });
                    showToast("已從 Open Library 載入書籍資料！");
                } else {
                    // 都找不到，則手動建檔
                    populateForm({ isbn: isbn });
                    showToast("找不到這本書，請您手動輸入資料喔！", "info");
                }
            }
        } catch (error) {
            console.error("API 查詢錯誤:", error);
            // 網路失敗也允許手動建檔
            populateForm({ isbn: isbn });
            showToast("網路查詢失敗，您可以直接手動輸入！", "info");
        }
    }

    // 將書籍資訊帶入表單中
    function populateForm(book) {
        inputTitle.value = book.title || "";
        inputAuthor.value = book.author || "";
        inputIsbn.value = book.isbn || "";
        inputPublisher.value = book.publisher || "";
        inputPublishDate.value = book.publishDate || "";
        inputCoverUrl.value = book.coverUrl || "";
        inputNotes.value = ""; // 清空前一次的備註

        // 封面預覽
        if (book.coverUrl) {
            formCover.src = book.coverUrl;
            formCover.classList.remove('hidden');
            formCoverPlaceholder.classList.add('hidden');
        } else {
            formCover.classList.add('hidden');
            formCoverPlaceholder.classList.remove('hidden');
        }

        // 滾動並展開表單
        bookFormSection.classList.remove('hidden');
        bookFormSection.scrollIntoView({ behavior: 'smooth' });
    }

    // 清除表單
    function clearForm() {
        bookForm.reset();
        formCover.classList.add('hidden');
        formCoverPlaceholder.classList.remove('hidden');
        bookFormSection.classList.add('hidden');
    }

    // 事件監聽：啟動/停止相機
    btnToggleScan.addEventListener('click', toggleScanner);

    // 事件監聽：手動輸入 ISBN 視窗
    btnManualInput.addEventListener('click', () => {
        modalManual.classList.remove('hidden');
        modalIsbnInput.focus();
    });

    btnModalCancel.addEventListener('click', () => {
        modalManual.classList.add('hidden');
        modalIsbnInput.value = "";
    });

    btnModalSubmit.addEventListener('click', () => {
        const isbn = modalIsbnInput.value.trim().replace(/[-\s]/g, '');
        if (isbn) {
            modalManual.classList.add('hidden');
            modalIsbnInput.value = "";
            fetchBookInfo(isbn);
        } else {
            showToast("請輸入有效的 ISBN", "error");
        }
    });

    btnClearForm.addEventListener('click', (e) => {
        e.preventDefault();
        clearForm();
    });

    // 監聽封面網址欄位，即時預覽封面
    inputCoverUrl.addEventListener('input', () => {
        const url = inputCoverUrl.value.trim();
        if (url) {
            formCover.src = url;
            formCover.classList.remove('hidden');
            formCoverPlaceholder.classList.add('hidden');
        } else {
            formCover.classList.add('hidden');
            formCoverPlaceholder.classList.remove('hidden');
        }
    });

    // 表單提交：傳送到 Google Apps Script / Google 試算表
    bookForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        // 防呆：確認是否設定了 API URL
        if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL === '請將您的網頁應用程式URL貼在這邊') {
            showToast("請先在 index.html 填入 Google Apps Script URL！", "error");
            return;
        }

        const saveBtn = document.getElementById('btn-save-book');
        const originalBtnHTML = saveBtn.innerHTML;
        
        // 轉圈圈等待效果
        saveBtn.disabled = true;
        saveBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> 正在傳送到雲端...`;

        // 包裝要傳送的資料
        const bookData = {
            title: inputTitle.value.trim(),
            author: inputAuthor.value.trim(),
            isbn: inputIsbn.value.trim(),
            publisher: inputPublisher.value.trim(),
            publishDate: inputPublishDate.value.trim(),
            coverUrl: inputCoverUrl.value.trim(),
            notes: inputNotes.value.trim()
        };

        try {
            // 使用 fetch 的 POST 模式傳送
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // 避免本地端調用跨網域問題
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(bookData)
            });

            // 因為使用 no-cors 模式，我們得不到 response 內容，但如果沒有丟出 exception 基本上就是成功
            showToast("資料已成功寫入 Google 試算表！", "success");
            clearForm();

        } catch (error) {
            console.error("儲存失敗:", error);
            showToast("儲存失敗，請檢查網路連線或試算表設定", "error");
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = originalBtnHTML;
        }
    });

    // 當頁面關閉或跳轉，確保關閉相機
    window.addEventListener('beforeunload', stopScanner);
</script>

</body> </html>
