<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BiblioKeep 智慧書籍管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .scan-laser { animation: scan-anim 2s infinite ease-in-out; }
        @keyframes scan-anim { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans antialiased">

    <header class="bg-indigo-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-book-bookmark text-amber-300"></i> BiblioKeep
            </h1>
            <span id="sync-status-badge" class="text-[10px] bg-emerald-500 px-2.5 py-1 rounded-full font-semibold">雲端已連線</span>
        </div>
    </header>

    <main class="flex-1 max-w-md w-full mx-auto p-4 flex flex-col gap-5 pb-24">
        <!-- 系統狀態提示區 -->
        <div id="setup-warning" class="hidden bg-amber-50 border-l-4 border-amber-500 p-4 rounded-r-2xl shadow-sm">
            <h3 class="font-bold text-amber-800 text-sm">尚未啟用 Google 試算表同步</h3>
            <p class="text-xs text-amber-700 mt-1">請檢查程式碼中的 GOOGLE_SCRIPT_URL 設定。</p>
        </div>

        <!-- 掃描區域 -->
        <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <div id="interactive" class="w-full aspect-[4/3] bg-slate-900 rounded-2xl overflow-hidden relative">
                <div id="scanner-laser" class="absolute inset-0 z-20 hidden flex justify-center items-center pointer-events-none">
                    <div class="w-4/5 h-1/2 border-2 border-emerald-400 rounded-2xl relative overflow-hidden">
                        <div class="w-full h-[2px] bg-emerald-400 shadow-[0_0_8px_#34d399] absolute left-0 scan-laser"></div>
                    </div>
                </div>
            </div>
            <button id="btn-toggle-scan" onclick="toggleScanner()" class="w-full mt-4 bg-indigo-600 text-white font-bold py-3.5 rounded-xl shadow-md">啟動掃描</button>
        </section>

        <!-- 表單區域 -->
        <section id="book-form-section" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hidden">
            <h2 class="text-base font-bold mb-4">書籍編目確認</h2>
            <form id="book-form" onsubmit="saveBookToCloud(event)" class="flex flex-col gap-3">
                <input type="text" id="input-title" placeholder="書名" required class="w-full bg-slate-50 border rounded-xl px-3 py-2 text-sm">
                <input type="text" id="input-author" placeholder="作者" class="w-full bg-slate-50 border rounded-xl px-3 py-2 text-sm">
                <input type="text" id="input-isbn" placeholder="ISBN" class="w-full bg-slate-50 border rounded-xl px-3 py-2 text-sm font-mono">
                <button type="submit" id="btn-save-book" class="w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl mt-2">儲存至試算表</button>
            </form>
        </section>
    </main>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxIGRl4GqQO4N1um4C72JsAwh0haEBsQqKusQkSlnSx7zEzLkyRraTQeg0RWB6w6TU/exec';
        let html5QrCode = null;

        // 改良後的初始化檢查，直接驗證網址是否包含 script.google.com
        window.onload = () => {
            const isValidUrl = GOOGLE_SCRIPT_URL.startsWith('https://script.google.com/');
            if (!isValidUrl) {
                document.getElementById('setup-warning').classList.remove('hidden');
                document.getElementById('sync-status-badge').textContent = "未連線";
                document.getElementById('sync-status-badge').className = "text-[10px] bg-red-500 px-2.5 py-1 rounded-full font-semibold";
            } else {
                document.getElementById('setup-warning').classList.add('hidden');
                document.getElementById('sync-status-badge').textContent = "雲端已連線";
                document.getElementById('sync-status-badge').className = "text-[10px] bg-emerald-500 px-2.5 py-1 rounded-full font-semibold";
            }
        };

        async function toggleScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
                document.getElementById('btn-toggle-scan').textContent = "啟動掃描";
                document.getElementById('scanner-laser').classList.add('hidden');
            } else {
                html5QrCode = new Html5Qrcode("interactive");
                try {
                    await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                        toggleScanner();
                        fetchBookInfo(text);
                    });
                    document.getElementById('btn-toggle-scan').textContent = "停止掃描";
                    document.getElementById('scanner-laser').classList.remove('hidden');
                } catch (err) {
                    alert("無法啟動相機，請檢查瀏覽器權限。");
                }
            }
        }

        async function fetchBookInfo(isbn) {
            const cleanIsbn = isbn.replace(/[^0-9X]/g, '');
            alert("正在查詢書籍資訊...");
            
            try {
                const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${cleanIsbn}`);
                const data = await res.json();
                if (data.totalItems > 0) {
                    const info = data.items[0].volumeInfo;
                    fillForm({ title: info.title, author: info.authors?.join(', '), isbn: cleanIsbn });
                } else {
                    const scrapeRes = await fetch(`${GOOGLE_SCRIPT_URL}?isbn=${cleanIsbn}`);
                    const scrapeData = await scrapeRes.json();
                    if (scrapeData.status === 'success') {
                        fillForm(scrapeData.data);
                    } else {
                        fillForm({ isbn: cleanIsbn });
                    }
                }
            } catch (e) {
                fillForm({ isbn: cleanIsbn });
            }
        }

        function fillForm(book) {
            document.getElementById('input-title').value = book.title || "";
            document.getElementById('input-author').value = book.author || "";
            document.getElementById('input-isbn').value = book.isbn || "";
            document.getElementById('book-form-section').classList.remove('hidden');
        }

        async function saveBookToCloud(e) {
            e.preventDefault();
            const data = {
                isbn: document.getElementById('input-isbn').value,
                title: document.getElementById('input-title').value,
                author: document.getElementById('input-author').value
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                alert("已同步至試算表！");
                document.getElementById('book-form-section').classList.add('hidden');
            } catch (err) {
                alert("同步失敗，請檢查網路。");
            }
        }
    </script>
</body>
</html>
